spring.application.name=RinconGaditano

server.port=${PORT:8080}

#Database
#spring.datasource.url=jdbc:mysql://localhost:3306/SportAQS?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format-sql=true

#Email
spring.mail.host=smtp.sendgrid.net
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtps.ssl.enable=true

app.from-email=${SENDGRID_FROM_EMAIL}
app.backend-url=${APP_BACKEND_URL}